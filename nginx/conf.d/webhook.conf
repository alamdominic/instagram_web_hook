# ─────────────────────────────────────────────
# HTTP → redirige todo a HTTPS
# Meta también usa HTTP para el challenge inicial,
# pero la redirección funciona porque Meta sigue el 301.
# ─────────────────────────────────────────────
server {
    listen 80;
    server_name tudominio.com;

    # Certbot necesita este bloque para emitir/renovar el certificado SSL.
    # Responde a: http://tudominio.com/.well-known/acme-challenge/...
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Todo lo demás → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────
# HTTPS — servidor principal
# ─────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name tudominio.com;

    # ── SSL ──────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tudominio.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Seguridad básica ─────────────────────
    add_header X-Frame-Options        "DENY"           always;
    add_header X-Content-Type-Options "nosniff"        always;
    add_header X-XSS-Protection       "1; mode=block"  always;

    # ── Tamaño máximo del body ────────────────
    # Los payloads de Instagram son pequeños (~10KB),
    # 1MB es más que suficiente y evita abuso.
    client_max_body_size 1m;

    # ── Health check ─────────────────────────
    # Ruta liviana para monitoreo / load balancer.
    # No necesita logging.
    location /health {
        proxy_pass         http://app:8000/health;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── Webhook de Instagram ──────────────────
    # CRÍTICO: proxy_request_buffering off
    # Nginx debe pasar el body crudo SIN bufferear ni modificar.
    # Si nginx buffeara el body, la firma HMAC SHA256 que calcula
    # el WebhookChecker fallaría porque los bytes cambiarían.
    location /webhook {
        proxy_pass                  http://app:8000/webhook;

        proxy_request_buffering     off;  # ← body crudo intacto para HMAC

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        # Meta espera respuesta en < 5s o reintenta.
        # Estos timeouts evitan que nginx corte la conexión antes.
        proxy_connect_timeout   5s;
        proxy_send_timeout      10s;
        proxy_read_timeout      10s;
    }

    # ── Bloquear todo lo demás ────────────────
    # Este servicio solo expone /webhook y /health.
    # Cualquier otra ruta devuelve 404.
    location / {
        return 404;
    }
}