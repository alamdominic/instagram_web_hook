version: "3.9"

services:
  app:
    build: .
    container_name: webhook_app
    env_file: .env
    restart: unless-stopped
    expose:
      - "8000"
    networks:
      - web

  nginx:
    image: nginx:1.27-alpine
    container_name: webhook_nginx
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certbot:/var/www/certbot
      - ./nginx/ssl:/etc/letsencrypt:ro
    restart: unless-stopped
    networks:
      - web

networks:
  web:
    driver: bridge
